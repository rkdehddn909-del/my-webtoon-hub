  <style>
    :root {
      --bg: #0b0e14; --card-bg: #1c2128; --accent: #00dc64;
      --text: #adbac7; --text-bold: #f0f6fc; --border: #30363d;
      --ad-bg: #161b22; 
      --naver: #00dc64; --kakao-page: #ffcd00; --kakao-webtoon: #ff413a; --lezhin: #ed1c24;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; padding-bottom: 70px; line-height: 1.4; }

    /* Header & Revenue Ads */
    header { position: sticky; top: 0; z-index: 1000; background: rgba(11, 14, 20, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px; }
    .header-content { max-width: 1600px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
    .header-top { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
    .logo { font-size: 1.4rem; font-weight: 900; color: var(--accent); text-decoration: none; letter-spacing: -1px; }
    
    .ad-slot-top { flex-grow: 1; background: var(--ad-bg); height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px dashed #444; font-size: 0.7rem; color: #666; text-align: center; }
    .auth-buttons { display: flex; align-items: center; gap: 10px; }
    .auth-btn { background: var(--accent); color: #000; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: bold; transition: 0.2s; }
    .auth-btn:hover { background: #00b44a; }
    .user-info { color: var(--text); font-size: 0.9rem; }

    .search-box { width: 100%; position: relative; }
    .search-input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--ad-bg); color: white; outline: none; font-size: 0.9rem; transition: 0.3s; }
    .search-input:focus { border-color: var(--accent); background: #1c2128; box-shadow: 0 0 15px rgba(0, 220, 100, 0.15); }

    /* Filters */
    .filter-scroll { display: flex; overflow-x: auto; gap: 6px; padding: 4px 0; scrollbar-width: none; }
    .filter-scroll::-webkit-scrollbar { display: none; }
    .chip { white-space: nowrap; padding: 6px 14px; border-radius: 15px; background: var(--ad-bg); border: 1px solid var(--border); font-size: 0.75rem; cursor: pointer; color: var(--text); transition: 0.2s; }
    .chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }

    /* Responsive Grid Layout */
    .container { max-width: 1600px; margin: 0 auto; padding: 10px; }
    .webtoon-grid { 
      display: grid; 
      /* 모바일 최적화: 아주 작은 화면에서도 3개 이상 유지 */
      grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
      gap: 10px; 
    }

    .w-card { background: var(--card-bg); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); transition: 0.25s; cursor: pointer; display: flex; flex-direction: column; }
    .w-card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    
    .w-thumb { 
      width: 100%; aspect-ratio: 1 / 1.25; background: linear-gradient(135deg, #2d333b 0%, #1c2128 100%); 
      display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px; 
      font-size: 0.65rem; color: #fff; font-weight: bold; overflow: hidden; position: relative; border-bottom: 1px solid var(--border);
    }
    
    .w-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
    .w-title { font-size: 0.75rem; color: var(--text-bold); font-weight: 600; line-height: 1.2; height: 2.4em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; margin-bottom: 6px; }
    
    .badge { font-size: 0.55rem; padding: 2px 5px; border-radius: 3px; font-weight: 800; border: 1px solid transparent; align-self: flex-start; }
    .b-naver { color: var(--naver); border-color: var(--naver); background: rgba(0,220,100,0.05); }
    .b-page { color: var(--kakao-page); border-color: var(--kakao-page); background: rgba(255,205,0,0.05); }
    .b-webtoon { color: var(--kakao-webtoon); border-color: var(--kakao-webtoon); background: rgba(255,65,58,0.05); }
    .b-lezhin { color: var(--lezhin); border-color: var(--lezhin); background: rgba(237,28,36,0.05); }

    /* Pagination & Footer Ads */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 6px; margin: 40px 0; flex-wrap: wrap; }
    .page-btn { min-width: 35px; height: 35px; border: 1px solid var(--border); background: var(--card-bg); color: var(--text); border-radius: 5px; cursor: pointer; transition: 0.2s; }
    .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: bold; }
    
    .ad-bottom { width: 100%; max-width: 728px; margin: 20px auto; background: var(--ad-bg); height: 90px; border: 1px dashed #444; display: flex; align-items: center; justify-content: center; color: #555; border-radius: 8px; }
    .copyright-note { max-width: 1600px; margin: 0 auto 20px; text-align: center; color: #8b96a2; font-size: 0.75rem; line-height: 1.5; }
    .contact-info { max-width: 1600px; margin: 0 auto 20px; text-align: center; color: #8b96a2; font-size: 0.75rem; line-height: 1.5; }

    /* Auth Modal */
    .auth-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; justify-content: center; align-items: center; z-index: 3000; }
    .auth-modal-content { background: var(--card-bg); padding: 20px; border-radius: 8px; max-width: 400px; width: 90%; text-align: center; }
    .auth-modal-content h3 { margin-bottom: 15px; color: var(--text-bold); }
    .auth-modal-content input { width: 100%; padding: 10px; margin: 5px 0; border: 1px solid var(--border); background: var(--ad-bg); color: var(--text); border-radius: 5px; }
    .auth-modal-content button { margin: 5px; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; background: var(--accent); color: #000; font-weight: bold; }
    .auth-modal-content ul { text-align: left; list-style: none; padding: 0; }
    .auth-modal-content li { padding: 5px 0; border-bottom: 1px solid var(--border); }
    .community-modal { max-width: 600px; max-height: 80vh; overflow-y: auto; }
    .posts-list { margin-top: 15px; }
    .post-item { background: var(--ad-bg); padding: 10px; margin-bottom: 10px; border-radius: 5px; }
    .post-item h4 { margin: 0 0 5px 0; color: var(--text-bold); }
    .post-item p { margin: 5px 0; color: var(--text); }
    .post-item small { color: #8b96a2; }

    /* Mobile Bottom Navigation */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #1c2128; border-top: 1px solid var(--border); display: flex; justify-content: space-around; align-items: center; z-index: 2000; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { color: var(--text); text-decoration: none; font-size: 0.65rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .nav-item svg { width: 20px; height: 20px; fill: currentColor; }

    @media (min-width: 768px) {
      .webtoon-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
      .w-title { font-size: 0.85rem; }
    }
  </style>

    case 'page': 
    case 'kakao': 
      return `https://page.kakao.com/search/result?keyword=${enc}&categoryUid=10`;
    case 'webtoon': 
      return `https://webtoon.kakao.com/search?keyword=${enc}`;
    case 'lezhin': 
      return `https://www.lezhin.com/ko/search?q=${enc}&condition=all`;
    default: 
      return `https://search.naver.com/search.naver?query=${enc}+웹툰`;
  }
}

function render() {
  const grid = document.getElementById('mainGrid');
  const filtered = db.filter(item => {
    return (curPlat === 'all' || item.p === curPlat) &&
           (item.t.toLowerCase().includes(keyword.toLowerCase()));
  });

  const totalPages = Math.ceil(filtered.length / itemsPerPage);
  const start = (curPage - 1) * itemsPerPage;
  const pageData = filtered.slice(start, start + itemsPerPage);

  if(pageData.length === 0) {
    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 100px; color: #555;">검색 결과가 없습니다.</div>`;
    renderPagination(0);
    return;
  }

  grid.innerHTML = pageData.map(item => {
    const url = getSearchUrl(item.t, item.p);
    let pName = "", bClass = "";
    if(item.p==='naver'){pName="NAVER"; bClass="b-naver";}
    else if(item.p==='page' || item.p==='kakao'){pName="KAKAO PAGE"; bClass="b-page";}
    else if(item.p==='webtoon'){pName="WEBTOON"; bClass="b-webtoon";}
    else if(item.p==='lezhin'){pName="LEZHIN"; bClass="b-lezhin";}
    else {pName="WEBTOON"; bClass="b-naver";} // 기본값

    return `
      <div class="w-card" onclick="authManager.addWatchedWebtoon('${item.t}', '${item.p}'); window.open('${url}', '_blank')">
        <div class="w-thumb">${item.t}</div>
        <div class="w-info">
          <p class="w-title">${item.t}</p>
          <span class="badge ${bClass}">${pName}</span>
        </div>
      </div>
    `;
  }).join('');

  renderPagination(totalPages);
}

function renderPagination(total) {
  const pagin = document.getElementById('pagination');
  if(total <= 1) { pagin.innerHTML = ''; return; }
  let html = '';
  // 이전 페이지 버튼 생략 (간결화)
  for(let i=1; i<=total; i++) {
    html += `<button class="page-btn ${i===curPage?'active':''}" onclick="changePage(${i})">${i}</button>`;
  }
  pagin.innerHTML = html;
}

function changePage(p) { 
  curPage = p; 
  render(); 
  window.scrollTo({top: 0, behavior: 'smooth'}); 
}

function setFilter(val, el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  curPlat = val;
  curPage = 1; 
  render();
}

function handleSearch() {
  keyword = document.getElementById('searchInput').value;
  curPage = 1; 
  render();
}

function pickRandom() {
  const r = db[Math.floor(Math.random() * db.length)];
  if(confirm(`🎲 오늘 볼만한 추천 웹툰:\n[ ${r.t} ]\n\n해당 플랫폼으로 이동하시겠습니까?`)) {
    authManager.addWatchedWebtoon(r.t, r.p);
    window.open(getSearchUrl(r.t, r.p), '_blank');
  }
}

// 초기 실행
render();
</script>
<script src="app.js"></script>
</body>
</html>
